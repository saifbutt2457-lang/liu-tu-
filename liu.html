<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free AI Chatbot</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef2f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 400px; height: 500px; background: white; box-shadow: 0 8px 24px rgba(0,0,0,0.1); border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: #007bff; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #f8f9fa; }
        .message { padding: 10px 14px; border-radius: 15px; max-width: 75%; font-size: 14px; line-height: 1.4; white-space: pre-wrap; }
        .user { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot { background: white; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .input-area { display: flex; border-top: 1px solid #eee; padding: 12px; background: white; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; padding-left: 20px; font-size: 14px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; margin-left: 8px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">🤖 Free AI Assistant</div>
    <div class="messages" id="chat-box">
        <div class="message bot">Hello! I am a free AI. Ask me any question, and I will answer it!</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask a question..." onkeypress="handleKeyPress(event)">
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    function handleKeyPress(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    }

    async function sendMessage() {
        const inputEl = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");
        const text = inputEl.value.trim();
        if (!text) return;

        // 1. Show user message
        appendMessage(text, "user");
        inputEl.value = "";
        inputEl.disabled = true;
        sendBtn.disabled = true;

        // Show a temporary "typing..." message
        appendMessage("Thinking...", "bot text-muted");
        const chatBox = document.getElementById("chat-box");
        const typingMessage = chatBox.lastChild;

        try {
            // 2. Call a free, public text-generation API (No key needed)
            const response = await fetch("https://api-inference.huggingface.co/models/HuggingFaceH4/zephyr-7b-beta", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ inputs: `User: ${text}\nAssistant:` })
            });
            
            const data = await response.json();
            
            // Extract the text reply from the API response
            let botReply = data[0].generated_text.split("Assistant:").pop().trim();
            
            // Remove the typing placeholder and show the real answer
            typingMessage.remove();
            appendMessage(botReply, "bot");

        } catch (error) {
            typingMessage.remove();
            appendMessage("Sorry, I had trouble reaching the server. Try again!", "bot");
        }

        inputEl.disabled = false;
        sendBtn.disabled = false;
        inputEl.focus();
    }

    function appendMessage(text, className) {
        const chatBox = document.getElementById("chat-box");
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
